# Great Expectations configuration for Azure Medallion Pipeline
# Validates data at each medallion layer boundary: Bronze -> Silver -> Gold

config_version: 3.0

# -------------------------------------------------------
# Datasources
# -------------------------------------------------------
# Local filesystem datasource for development / CI
datasources:
  local_csv:
    class_name: Datasource
    module_name: great_expectations.datasource
    execution_engine:
      class_name: PandasExecutionEngine
      module_name: great_expectations.execution_engine
    data_connectors:
      default_inferred_data_connector_name:
        class_name: InferredAssetFilesystemDataConnector
        module_name: great_expectations.datasource.data_connector
        base_directory: ../data/
        default_regex:
          group_names:
            - data_asset_name
          pattern: (.*)\.csv
      default_runtime_data_connector_name:
        class_name: RuntimeDataConnector
        module_name: great_expectations.datasource.data_connector
        batch_identifiers:
          - default_identifier_name

  # Production Databricks datasource (uncomment when deploying to Databricks)
  # databricks:
  #   class_name: Datasource
  #   module_name: great_expectations.datasource
  #   execution_engine:
  #     class_name: SparkDFExecutionEngine
  #     module_name: great_expectations.execution_engine
  #     connection_string: "databricks://<workspace_url>:443?http_path=<http_path>&catalog=<catalog>"
  #   data_connectors:
  #     default_inferred_data_connector_name:
  #       class_name: InferredAssetFilesystemDataConnector
  #       module_name: great_expectations.datasource.data_connector
  #       base_directory: /dbfs/mnt/medallion/
  #       default_regex:
  #         group_names:
  #           - data_asset_name
  #         pattern: (.*)\.delta

# -------------------------------------------------------
# Stores
# -------------------------------------------------------
stores:
  expectations_store:
    class_name: ExpectationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: expectations/

  validations_store:
    class_name: ValidationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: uncommitted/validations/

  evaluation_parameter_store:
    class_name: EvaluationParameterStore

  checkpoint_store:
    class_name: CheckpointStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: checkpoints/

  data_docs_site_store:
    class_name: DataDocsSiteStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: uncommitted/data_docs/

# -------------------------------------------------------
# Expectations Store Name
# -------------------------------------------------------
expectations_store_name: expectations_store

# -------------------------------------------------------
# Validations Store Name
# -------------------------------------------------------
validations_store_name: validations_store

# -------------------------------------------------------
# Evaluation Parameter Store Name
# -------------------------------------------------------
evaluation_parameter_store_name: evaluation_parameter_store

# -------------------------------------------------------
# Checkpoint Store Name
# -------------------------------------------------------
checkpoint_store_name: checkpoint_store

# -------------------------------------------------------
# Data Docs
# -------------------------------------------------------
data_docs_sites:
  local_site:
    class_name: SiteBuilder
    show_how_to_buttons: true
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: uncommitted/data_docs/local_site/
    site_index_builder:
      class_name: DefaultSiteIndexBuilder

# -------------------------------------------------------
# Plugins
# -------------------------------------------------------
plugins_directory: plugins/

# -------------------------------------------------------
# Profilers
# -------------------------------------------------------
profilers_store_name: expectations_store

# -------------------------------------------------------
# Usage Statistics (opt out)
# -------------------------------------------------------
anonymous_usage_statistics:
  enabled: false
