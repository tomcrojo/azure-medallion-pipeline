name: CI — Medallion Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.7.0"
  PYTHON_VERSION: "3.11"

jobs:
  # -------------------------------------------------------
  # Job 1: Lint
  # -------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python linting
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python linting tools
        run: pip install ruff

      - name: Ruff check
        run: ruff check notebooks/ tests/ --output-format=github

      # Terraform linting
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint init
        working-directory: terraform
        run: tflint --init

      - name: tflint check
        working-directory: terraform
        run: tflint --format=compact

  # -------------------------------------------------------
  # Job 2: Tests
  # -------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # -------------------------------------------------------
  # Job 3: Data Quality
  # -------------------------------------------------------
  quality:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install pandas

      - name: Smoke test quality script
        run: python -m py_compile scripts/run_quality_checks.py

      - name: Upload Great Expectations assets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ge-assets
          path: great_expectations/

  # -------------------------------------------------------
  # Job 4: Terraform Validate & Plan
  # -------------------------------------------------------
  terraform:
    runs-on: ubuntu-latest
    needs: [lint, quality]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Check Azure credentials availability
        id: azure-creds
        run: |
          if [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ] && \
             [ -n "${{ secrets.AZURE_CLIENT_ID }}" ] && \
             [ -n "${{ secrets.AZURE_CLIENT_SECRET }}" ] && \
             [ -n "${{ secrets.AZURE_TENANT_ID }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Plan
        if: steps.azure-creds.outputs.available == 'true'
        working-directory: terraform
        run: terraform plan -input=false -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" -out=tfplan
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        continue-on-error: true

      - name: Skip Terraform plan without Azure credentials
        if: steps.azure-creds.outputs.available != 'true'
        run: echo "Skipping terraform plan because Azure credentials are not configured for this public repo."

      - name: Upload plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
